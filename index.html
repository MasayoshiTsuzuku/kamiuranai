<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神と髪 — 髪占い</title>
<meta name="description" content="髪はその人の物語を映す鏡。頭皮・髪質・骨格・生まれ持った星から、あなたの髪の神様と本来の自分へ還るケアを導きます。">
<meta property="og:title" content="神と髪 — 髪占い">
<meta property="og:description" content="髪はその人の物語を映す鏡。12柱の髪の神様と四柱推命が、あなたの本質と開運を読み解きます。">
<meta property="og:image" content="https://masayoshitsuzuku.github.io/kamiuranai/images/hero-torii-full.jpg">
<meta property="og:url" content="https://masayoshitsuzuku.github.io/kamiuranai/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #2b2926;
  --sand: #f6f1e9;
  --sea: #2f5d5a;
  --gold: #b08d57;
  --white: #fffdf9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Serif JP', serif;
  background: var(--sand);
  color: var(--ink);
  line-height: 1.9;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
.screen { display: none; max-width: 640px; margin: 0 auto; padding: 2rem 5vw 4rem; }
.screen.active { display: block; }

/* ---------- 共通パーツ ---------- */
h1, h2, h3 { font-family: 'Shippori Mincho', serif; }
.eyebrow { letter-spacing: 0.3em; font-size: 0.72rem; color: var(--gold); text-align: center; margin-bottom: 0.8rem; }
.btn {
  display: block; width: 100%; padding: 1rem;
  font-family: 'Noto Serif JP', serif; font-size: 1rem;
  background: var(--sea); color: #fff; border: none; border-radius: 4px;
  cursor: pointer; letter-spacing: 0.1em; margin-top: 1.5rem;
}
.btn:active { opacity: 0.85; }
.btn.ghost { background: transparent; color: var(--sea); border: 1px solid var(--sea); }
.btn.small { width: auto; display: inline-block; padding: 0.5rem 1.2rem; font-size: 0.85rem; margin-top: 0; }
.btn-row { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
.btn-row .btn { margin-top: 0; }

/* ---------- スタート画面 ---------- */
#start.screen { text-align: center; max-width: none; padding: 0; }
.hero-stage { position: relative; width: 100%; line-height: 0; }
.hero-stage img { width: 100%; height: auto; display: block; }
.hero-stage .hero-mobile { display: none; }
.start-body { max-width: 640px; margin: 0 auto; padding: 0 5vw 3rem; }

/* 画像の中に重ねる本物のボタン */
.overlay-btn, .overlay-link {
  position: absolute; display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif JP', serif; letter-spacing: 0.12em; line-height: 1;
  border-radius: 4px; cursor: pointer; padding: 0;
}
.overlay-btn { font-size: clamp(11px, 1.05vw, 20px); }
.ob-fill { background: var(--sea); color: #fff; border: 1px solid rgba(176,141,87,0.6); }
.ob-fill:active { opacity: 0.85; }
.ob-ghost { background: #fbf8f1; color: var(--ink); border: 1px solid rgba(176,141,87,0.55); }
.ob-ghost:active { background: #f1ece0; }
.overlay-link { font-size: clamp(9px, 0.8vw, 15px); color: #6b665d; text-decoration: underline; background: none; border: none; }
.mobile-actions { display: none; }

@media (max-width: 820px) {
  .hero-stage .hero-full { display: none; }
  .hero-stage .hero-mobile { display: block; height: 44vh; object-fit: cover; object-position: center 20%; }
  .overlay-btn, .overlay-link { display: none; }
  .mobile-actions { display: block; margin-top: 1.6rem; }
}

/* ---------- 質問画面 ---------- */
.progress { height: 3px; background: rgba(43,41,38,0.1); border-radius: 2px; margin-bottom: 0.6rem; }
.progress-bar { height: 100%; background: var(--gold); border-radius: 2px; width: 0; transition: width 0.3s; }
.step-label { font-size: 0.75rem; color: var(--gold); letter-spacing: 0.2em; text-align: center; margin-bottom: 1.6rem; }
.q-title { font-size: 1.25rem; color: var(--sea); margin-bottom: 1.6rem; text-align: center; }
.field { margin-bottom: 1.6rem; }
.field > label.name { display: block; font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--ink); font-weight: 600; }
.choices { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.choices label {
  padding: 0.55rem 1rem; border: 1px solid rgba(43,41,38,0.25); border-radius: 999px;
  font-size: 0.9rem; cursor: pointer; background: var(--white); user-select: none;
}
.choices input { display: none; }
.choices input:checked + span { color: #fff; }
.choices label:has(input:checked) { background: var(--sea); border-color: var(--sea); color: #fff; }
input[type="text"], input[type="date"], input[type="number"], select, textarea {
  width: 100%; padding: 0.7rem; border: 1px solid rgba(43,41,38,0.25); border-radius: 4px;
  font-family: 'Noto Serif JP', serif; font-size: 1rem; background: var(--white); color: var(--ink);
}
textarea { min-height: 4.5rem; resize: vertical; }
.hint { font-size: 0.75rem; color: #8a8577; margin-top: 0.3rem; }

/* ---------- 結果画面 ---------- */
.result-card {
  background: var(--white); border-radius: 6px; padding: 2rem 1.6rem; margin-bottom: 1.4rem;
  border-top: 3px solid var(--gold);
}
.result-card h3 { color: var(--sea); font-size: 1.05rem; margin-bottom: 0.8rem; letter-spacing: 0.1em; }
.result-card p { font-size: 0.95rem; margin-bottom: 0.6rem; }
.kami-name {
  text-align: center; padding: 2.5rem 1rem; margin-bottom: 1.4rem;
  background: linear-gradient(160deg, #2f5d5a 0%, #1e403e 100%); color: #fff; border-radius: 6px;
  min-height: 380px; display: flex; flex-direction: column; justify-content: center;
  text-shadow: 0 1px 8px rgba(0,0,0,0.55);
}
.kami-name .small-label { font-size: 0.75rem; letter-spacing: 0.3em; color: #e8d9bd; margin-bottom: 1rem; }
.kami-name h2 { font-size: 1.7rem; letter-spacing: 0.12em; margin-bottom: 0.8rem; }
.kami-name .kami-words { font-size: 0.9rem; opacity: 0.9; }
.badge-row { display: flex; justify-content: center; gap: 0.6rem; margin-top: 1.2rem; flex-wrap: wrap; }
.badge { font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.4); border-radius: 999px; padding: 0.25rem 0.9rem; }

/* ---------- 記録一覧 ---------- */
.record {
  background: var(--white); border-radius: 6px; padding: 1.2rem 1.4rem; margin-bottom: 0.8rem;
  display: flex; justify-content: space-between; align-items: center; gap: 1rem;
  border-left: 3px solid var(--gold); cursor: pointer;
}
.record .info { flex: 1; min-width: 0; }
.record .name { font-weight: 600; }
.record .meta { font-size: 0.78rem; color: #8a8577; }
.record .del { background: none; border: none; color: #b05757; font-size: 0.8rem; cursor: pointer; font-family: inherit; flex-shrink: 0; }
.empty { text-align: center; color: #8a8577; padding: 3rem 0; font-size: 0.9rem; }
.top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 0.5rem; }
.top-nav a { color: var(--sea); text-decoration: none; font-size: 0.85rem; cursor: pointer; }
.rec-badge { font-size: 0.7rem; color: var(--sea); border: 1px solid rgba(47,93,90,0.4); border-radius: 999px; padding: 0.05rem 0.6rem; margin-left: 0.4rem; white-space: nowrap; }
.rec-badge.todo { color: #b05757; border-color: rgba(176,87,87,0.4); }

/* ---------- 施術記録・分析 ---------- */
.outcome-box { background: var(--white); border-radius: 6px; padding: 1.6rem; margin-top: 1.4rem; border-top: 3px solid var(--sea); }
.outcome-box h3 { color: var(--sea); font-size: 1rem; margin-bottom: 1rem; }
.stat-card { background: var(--white); border-radius: 6px; padding: 1.4rem 1.6rem; margin-bottom: 1rem; border-top: 3px solid var(--gold); }
.stat-card h3 { color: var(--sea); font-size: 1rem; margin-bottom: 0.8rem; }
.stat-card p { font-size: 0.88rem; margin-bottom: 0.2rem; }
.bar { height: 8px; background: rgba(47,93,90,0.12); border-radius: 4px; overflow: hidden; margin: 0.15rem 0 0.7rem; }
.bar > i { display: block; height: 100%; background: var(--sea); }
.settings-link { text-align: center; margin-top: 2.5rem; }
.settings-link a { font-size: 0.8rem; color: #8a8577; cursor: pointer; text-decoration: underline; }

/* ---------- 深い鑑定（四柱推命・九星） ---------- */
.deep-card { border-top-color: var(--sea); }
.pillar-grid { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.pillar { flex: 1; min-width: 68px; background: var(--sand); border-radius: 4px; padding: 0.7rem 0.4rem; text-align: center; }
.p-label { display: block; font-size: 0.7rem; color: #8a8577; }
.p-name { display: block; font-family: 'Shippori Mincho', serif; font-size: 1.25rem; color: var(--sea); letter-spacing: 0.08em; }
.p-ten { display: block; font-size: 0.72rem; color: var(--gold); }

/* ---------- シェア ---------- */
.share-row { background: var(--white); border-radius: 6px; padding: 1.4rem; margin-top: 1.4rem; text-align: center; }
.share-title { font-size: 0.85rem; color: #6b665d; margin-bottom: 0.8rem; }
.share-btn { display: inline-block; margin: 0.25rem; padding: 0.6rem 1.3rem; border-radius: 999px; font-size: 0.85rem; text-decoration: none; cursor: pointer; font-family: 'Noto Serif JP', serif; border: 1px solid rgba(43,41,38,0.2); color: var(--ink); background: #fff; }
.share-btn.line { background: #06C755; color: #fff; border-color: #06C755; }
.share-btn.x { background: #111; color: #fff; border-color: #111; }

/* ---------- 相性占い ---------- */
.aishou-form { background: var(--white); border-radius: 6px; padding: 1.6rem; margin-bottom: 1.4rem; }
.aishou-divider { text-align: center; color: var(--gold); letter-spacing: 0.3em; font-size: 0.8rem; margin: 1rem 0; }
</style>
</head>
<body>

<!-- ═══════ スタート ═══════ -->
<section id="start" class="screen active">
  <div class="hero-stage">
    <img src="images/hero-torii-full.jpg" alt="神と髪 — 髪占い" class="hero-full">
    <img src="images/hero-torii-mobile.jpg" alt="神と髪 — 髪占い" class="hero-mobile">
    <button class="overlay-btn ob-fill" style="left:37.2%; top:66.4%; width:25.6%; height:5.8%;" onclick="startDiagnosis()">占いをはじめる</button>
    <button class="overlay-btn ob-ghost" style="left:37.2%; top:73.7%; width:25.6%; height:6.1%;" onclick="showRecords()">これまでの記録を見る</button>
    <button class="overlay-btn ob-ghost" style="left:37.2%; top:80.9%; width:25.6%; height:6.1%;" onclick="showStats()">傾向を見る（分析）</button>
    <button class="overlay-btn ob-ghost" style="left:37.2%; top:88.2%; width:25.6%; height:6.1%;" onclick="showAishou()">ふたりの相性を占う</button>
  </div>
  <div class="start-body">
    <div class="mobile-actions">
      <button class="btn" onclick="startDiagnosis()">占いをはじめる</button>
      <button class="btn ghost" onclick="showAishou()">ふたりの相性を占う</button>
      <button class="btn ghost" onclick="showRecords()">これまでの記録を見る</button>
      <button class="btn ghost" onclick="showStats()">傾向を見る（分析）</button>
    </div>
    <p style="font-size:0.72rem; color:#a8a396; margin:1.4rem 0 0;">※回答は、占いをより良くするための研究データとして記録されます</p>
  </div>
</section>

<!-- ═══════ 質問 ═══════ -->
<section id="quiz" class="screen">
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <p class="step-label" id="stepLabel"></p>
  <div id="quizBody"></div>
  <p id="formError" style="color:#b05757; font-size:0.88rem; text-align:center; margin-top:1rem;"></p>
  <div class="btn-row">
    <button class="btn ghost" id="prevBtn" onclick="prevStep()">もどる</button>
    <button class="btn" id="nextBtn" onclick="nextStep()">つぎへ</button>
  </div>
</section>

<!-- ═══════ 結果 ═══════ -->
<section id="result" class="screen">
  <div id="resultBody"></div>
  <div class="btn-row">
    <button class="btn ghost" onclick="goHome()">トップへ</button>
    <button class="btn" onclick="startDiagnosis()">もう一度占う</button>
  </div>
</section>

<!-- ═══════ 記録一覧 ═══════ -->
<section id="records" class="screen">
  <div class="top-nav">
    <a onclick="goHome()">← トップへ</a>
    <span>
      <a onclick="exportCsv()">CSV書き出し</a> ／
      <a onclick="exportRecords()">JSON書き出し</a> ／
      <a onclick="syncAll()">シートへ全件送信</a>
    </span>
  </div>
  <p class="eyebrow">RECORDS</p>
  <h2 style="text-align:center; margin-bottom:2rem; color:var(--sea);">診断の記録</h2>
  <div id="recordList"></div>
</section>

<!-- ═══════ 傾向分析 ═══════ -->
<section id="stats" class="screen">
  <div class="top-nav">
    <a onclick="goHome()">← トップへ</a>
  </div>
  <p class="eyebrow">INSIGHTS</p>
  <h2 style="text-align:center; margin-bottom:2rem; color:var(--sea);">傾向を見る</h2>
  <div id="statsBody"></div>
</section>

<!-- ═══════ 相性占い ═══════ -->
<section id="aishou" class="screen">
  <div class="top-nav">
    <a onclick="goHome()">← トップへ</a>
  </div>
  <p class="eyebrow">SYNASTRY</p>
  <h2 style="text-align:center; margin-bottom:0.6rem; color:var(--sea);">ふたりの相性占い</h2>
  <p style="font-size:0.85rem; color:#6b665d; text-align:center; margin-bottom:1.6rem;">生まれた瞬間の空を重ね合わせて、ふたりの縁を読み解きます</p>
  <div class="aishou-form">
    <div class="field"><label class="name">ひとりめのお名前</label><input type="text" id="s1_name" placeholder="例：太郎"></div>
    <div class="field"><label class="name">生年月日</label><input type="date" id="s1_birth"></div>
    <p class="aishou-divider">×</p>
    <div class="field"><label class="name">ふたりめのお名前</label><input type="text" id="s2_name" placeholder="例：花子"></div>
    <div class="field"><label class="name">生年月日</label><input type="date" id="s2_birth"></div>
    <p id="aishouError" style="color:#b05757; font-size:0.88rem; text-align:center;"></p>
    <button class="btn" onclick="runAishou()">相性を占う</button>
  </div>
  <div id="aishouResult"></div>
</section>

<script>
/* ══════════════════════════════════════
   質問定義
   ══════════════════════════════════════ */
const STEPS = [
  {
    label: "お客さま情報",
    title: "はじめに、お名前を教えてください",
    fields: [
      { key: "name", type: "text", label: "お名前", placeholder: "例：都竹 花子" },
      { key: "birthdate", type: "date", label: "生年月日" },
      { key: "blood", type: "choice", label: "血液型", options: ["A", "B", "O", "AB", "不明"] },
      { key: "gender", type: "choice", label: "性別（命式の計算に使います）", options: ["男性", "女性", "答えない"] },
      { key: "birthtime", type: "choice", label: "生まれた時間帯（わかれば）", options: ["朝", "昼", "夕方", "夜", "深夜", "不明"] },
      { key: "birthTimeExact", type: "time", label: "出生時刻（わかれば・より詳しい鑑定になります）" },
      { key: "birthplace", type: "text", label: "出生地（わかれば）", placeholder: "例：大阪府" },
    ]
  },
  {
    label: "頭皮・髪質",
    title: "髪と頭皮のことを教えてください",
    fields: [
      { key: "scalpType", type: "choice", label: "頭皮のタイプ", options: ["乾燥", "脂性", "普通", "混合"] },
      { key: "scalpColor", type: "choice", label: "頭皮の色", options: ["健康的なピンク", "白", "黄", "赤み"] },
      { key: "thickness", type: "choice", label: "髪の太さ", options: ["細い", "普通", "太い"] },
      { key: "elasticity", type: "choice", label: "髪のコシ・弾力", options: ["強い", "弱い"] },
      { key: "curl", type: "choice", label: "髪のクセ", options: ["直毛", "波状", "強いくせ毛"] },
      { key: "cowlick", type: "choice", label: "つむじ（渦）", options: ["右巻き", "左巻き", "2つ以上", "不明"] },
      { key: "cowlickPos", type: "multi", label: "つむじ（渦）の位置（複数可）", options: ["前寄り", "頭頂部", "後ろ寄り", "わからない"] },
      { key: "volume", type: "choice", label: "毛量", options: ["少ない", "普通", "多い"] },
      { key: "shine", type: "choice", label: "ツヤ", options: ["あり", "普通", "なし"] },
      { key: "damage", type: "choice", label: "ダメージ度合い", options: ["ほぼなし", "少しある", "かなりある"] },
    ]
  },
  {
    label: "顔つき・骨格",
    title: "お顔立ちと骨格を教えてください",
    fields: [
      { key: "faceShape", type: "choice", label: "顔型", options: ["丸", "卵", "面長", "四角", "逆三角"] },
      { key: "bodyType", type: "choice", label: "骨格タイプ", options: ["ストレート", "ウェーブ", "ナチュラル", "不明"] },
      { key: "forehead", type: "choice", label: "額の広さ", options: ["広い", "普通", "狭い"] },
      { key: "hairline", type: "choice", label: "生え際の形", options: ["M字", "富士額", "標準"] },
    ]
  },
  {
    label: "悩み・ライフスタイル",
    title: "いまの悩みと、日々の暮らしについて",
    fields: [
      { key: "concerns", type: "multi", label: "現在の髪の悩み（複数可）", options: ["抜け毛", "パサつき", "うねり", "白髪", "ボリューム不足", "広がり", "頭皮のかゆみ", "特になし"] },
      { key: "rhythm", type: "choice", label: "生活リズム", options: ["朝型", "夜型", "不規則"] },
      { key: "stress", type: "choice", label: "ストレス度合い", options: ["低い", "普通", "高い"] },
      { key: "diet", type: "choice", label: "食生活の傾向", options: ["バランス良い", "外食が多い", "偏りがち", "小食"] },
    ]
  },
  {
    label: "占いでみたいこと",
    title: "今日は、何をみてみましょう",
    fields: [
      { key: "fortuneTopics", type: "multi", label: "占いでみてみたいこと（いくつでも）", options: ["総合運", "恋愛・結婚", "仕事・才能", "金運", "人間関係", "健康", "性格・本質", "未来予測", "開運"] },
      { key: "topWorry", type: "choice", label: "いま、一番気になっていることは？", options: ["恋愛・結婚", "仕事", "お金", "家族・人間関係", "健康", "自分の生き方", "特にない"] },
      { key: "worryDetail", type: "textarea", label: "よければ、少しだけ詳しく（任意）", placeholder: "例：転職しようか迷っている" },
    ]
  },
  {
    label: "なりたいイメージ",
    title: "最後に、なりたい自分を教えてください",
    fields: [
      { key: "idealImage", type: "text", label: "理想の髪型・雰囲気", placeholder: "例：ナチュラルで柔らかい印象" },
      { key: "colorPref", type: "choice", label: "好きな色・カラー傾向", options: ["暗め・落ち着き", "明るめ", "暖色系", "寒色系", "自然のまま"] },
      { key: "memo", type: "textarea", label: "メモ（施術者用・任意）", placeholder: "気づいたことなど" },
    ]
  },
];

/* ══════════════════════════════════════
   占いロジック
   ══════════════════════════════════════ */
const ZODIAC = [
  { name: "山羊座", until: [1, 19], element: "地" }, { name: "水瓶座", until: [2, 18], element: "風" },
  { name: "魚座", until: [3, 20], element: "水" }, { name: "牡羊座", until: [4, 19], element: "火" },
  { name: "牡牛座", until: [5, 20], element: "地" }, { name: "双子座", until: [6, 21], element: "風" },
  { name: "蟹座", until: [7, 22], element: "水" }, { name: "獅子座", until: [8, 22], element: "火" },
  { name: "乙女座", until: [9, 22], element: "地" }, { name: "天秤座", until: [10, 23], element: "風" },
  { name: "蠍座", until: [11, 22], element: "水" }, { name: "射手座", until: [12, 21], element: "火" },
  { name: "山羊座", until: [12, 31], element: "地" },
];

function getZodiac(dateStr) {
  const d = new Date(dateStr);
  const m = d.getMonth() + 1, day = d.getDate();
  for (const z of ZODIAC) {
    if (m < z.until[0] || (m === z.until[0] && day <= z.until[1])) return z;
  }
  return ZODIAC[0];
}

function getNumerology(dateStr) {
  let digits = dateStr.replace(/-/g, "").split("").map(Number);
  let n = digits.reduce((a, b) => a + b, 0);
  while (n > 9 && n !== 11 && n !== 22 && n !== 33) {
    n = String(n).split("").map(Number).reduce((a, b) => a + b, 0);
  }
  return n;
}

function getShichen(timeStr) {
  if (!timeStr) return null;
  const h = parseInt(timeStr.split(":")[0], 10);
  if (isNaN(h)) return null;
  return SHICHEN.find(s => s.from > s.to ? (h >= s.from || h < s.to) : (h >= s.from && h < s.to)) || null;
}

async function callTimeql(endpoint, payload) {
  const res = await fetch(getGasUrl(), {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "timeql", endpoint: endpoint, payload: payload })
  });
  if (!res.ok) throw new Error("http " + res.status);
  const data = await res.json();
  if (data && data.error) throw new Error(data.error);
  return data;
}

function buildBirthISO(a) {
  const t = a.birthTimeExact || "12:00";
  return a.birthdate + "T" + t + ":00+09:00";
}

function trimBazi(d) {
  const y = d.yojin || {};
  return {
    dayMaster: d.day_master ? d.day_master.kanji : "",
    dayMasterElement: d.day_master ? d.day_master.element : "",
    strength: y.day_master_strength || "",
    pillars: (d.pillar_analyses || []).map(p => ({
      type: p.pillar.pillar_type,
      typeJp: p.pillar.pillar_type_jp,
      name: p.pillar.sexagenary_name,
      tsuuhensei: p.tsuuhensei ? p.tsuuhensei.name : "",
    })),
    yojin: y.yojin || "",
    luckyColor: y.lucky_color || "",
    luckyDirection: y.lucky_direction || "",
    taiun: (d.taiun && d.taiun.periods ? d.taiun.periods : []).map(p => ({
      start: p.start_age, end: p.end_age, name: p.sexagenary_name,
      tsuuhensei: p.tsuuhensei ? p.tsuuhensei.name : "",
    })),
  };
}

function trimKyusei(d) {
  const h = d.honmeisei || {};
  return { name: h.name || "", personality: h.personality || "", advice: h.advice || "", color: h.color || "", direction: h.direction || "", keywords: h.keywords || [] };
}

function renderDeepCards(record) {
  const a = record.answers, t = record.timeql;
  let html = "";
  if (t.bazi && t.bazi.dayMaster) {
    const b = t.bazi;
    const dm = DAY_MASTER_TEXT[b.dayMaster] || {};
    const hasTime = !!a.birthTimeExact;
    const pillarsToShow = b.pillars.filter(p => hasTime || p.type !== "hour");
    html += `<div class="result-card deep-card">
      <h3>命式 — 生まれた瞬間の設計図</h3>
      <div class="pillar-grid">${pillarsToShow.map(p => `<div class="pillar"><span class="p-label">${p.typeJp}</span><span class="p-name">${p.name}</span><span class="p-ten">${p.tsuuhensei || "—"}</span></div>`).join("")}</div>
      <p>あなたの日主（生まれた日の干）は<strong>${b.dayMaster}——${dm.sym || b.dayMasterElement}</strong>。${dm.text || ""}</p>
      ${STRENGTH_TEXT[b.strength] ? `<p>${STRENGTH_TEXT[b.strength]}</p>` : ""}
      ${!hasTime ? `<p style="font-size:0.78rem; color:#8a8577;">※出生時刻が未入力のため、年・月・日の三柱を中心に鑑定しています。</p>` : ""}
    </div>`;
    const month = b.pillars.find(p => p.type === "month");
    if (month && TSUUHENSEI_TEXT[month.tsuuhensei]) {
      html += `<div class="result-card deep-card"><h3>本質の深層 — ${month.tsuuhensei}の人</h3><p>${TSUUHENSEI_TEXT[month.tsuuhensei]}</p></div>`;
    }
    const yh = YOJIN_HAIR[b.yojin];
    if (yh) {
      html += `<div class="result-card deep-card">
        <h3>用神 —「${b.yojin}」の気を髪から補う</h3>
        <p>命式のバランスを整える鍵（用神）は<strong>${b.yojin}の気</strong>。この気を髪と暮らしに取り入れるほど、運の巡りが滑らかになります。</p>
        <p>開運ヘアカラー：${yh.color}</p>
        <p>開運スタイル：${yh.style}</p>
        <p>開運ケア：${yh.care}</p>
        <p>開運習慣：${yh.habit}</p>
        ${b.luckyColor ? `<p>命式のラッキーカラーは「${b.luckyColor}」、力を呼ぶ方角は「${b.luckyDirection}」。</p>` : ""}
      </div>`;
    }
    if (b.taiun.length) {
      const age = getCurrentAge(a.birthdate);
      const curIdx = b.taiun.findIndex(p => age >= p.start && age <= p.end);
      if (curIdx >= 0) {
        const cur = b.taiun[curIdx];
        const next = b.taiun[curIdx + 1];
        html += `<div class="result-card deep-card">
          <h3>大運 — いま歩いている10年</h3>
          <p>${cur.start}歳から${cur.end}歳までのあなたは「<strong>${cur.tsuuhensei}</strong>」の大運の中にいます。${TAIUN_TEXT[cur.tsuuhensei] || ""}</p>
          ${next ? `<p>次の節目は<strong>${next.start}歳</strong>。そこから「${next.tsuuhensei}」の10年が始まります。${TAIUN_TEXT[next.tsuuhensei] || ""}</p>` : ""}
        </div>`;
      }
    }
  }
  if (t.kyusei && t.kyusei.name) {
    const k = t.kyusei;
    html += `<div class="result-card deep-card">
      <h3>九星 — ${k.name}の開運アクション</h3>
      <p>${k.personality}</p>
      <p>${k.advice}</p>
      <p>九星の守り色は<strong>${k.color}</strong>、縁の深い方位は<strong>${k.direction}</strong>。迷ったときは、この色とこの方角があなたの味方です。</p>
    </div>`;
  }
  return html;
}

    const gender = a.gender === "女性" ? "female" : "male";
    const base = { datetime: buildBirthISO(a), location: (a.birthplace ? a.birthplace : "Osaka") + ", Japan", name: a.name || "ゲスト" };
    const results = await Promise.all([
      callTimeql("bazi", Object.assign({ gender: gender }, base)),
      callTimeql("kyusei", base),
    ]);
    record.timeql = { bazi: trimBazi(results[0]), kyusei: trimKyusei(results[1]) };
    const list = loadRecords();
    const idx = list.findIndex(r => r.id === record.id);
    if (idx >= 0) { list[idx].timeql = record.timeql; localStorage.setItem(STORE_KEY, JSON.stringify(list)); }
    el.innerHTML = renderDeepCards(record);
  } catch (err) {
    const msg = String(err).indexOf("daily_limit") >= 0
      ? "本日の深い鑑定は定員に達しました。明日あらためてお試しください。"
      : "深い鑑定がただいま混み合っています。少し時間をおいて、記録一覧からこの結果を開き直してみてください。";
    el.innerHTML = `<div class="result-card deep-card"><h3>命式の間（四柱推命・九星）</h3><p>${msg}</p></div>`;
  }
}

}
function copyShare(text) {
  const s = text + "\n" + APP_URL;
  if (navigator.share) { navigator.share({ text: s }).catch(function(){}); return; }
  navigator.clipboard.writeText(s).then(function(){ alert("コピーしました。SNSやLINEに貼り付けて共有できます"); });
}

function renderAishou(n1, n2, d) {
  const score = Math.round(d.synastry_score || 0);
  const band = SCORE_BANDS.find(b => score >= b.min) || SCORE_BANDS[SCORE_BANDS.length - 1];
  const aspects = (d.aspects || []).slice().sort((x, y) => (y.score || 0) - (x.score || 0));
  const personal = ["sun", "moon", "mercury", "venus", "mars", "jupiter", "saturn"];
  const picked = [];
  for (const asp of aspects) {
    const p1 = String(asp.body1 || "").replace("p1_", "");
    const p2 = String(asp.body2 || "").replace("p2_", "");
    if (!PLANET_JP[p1] || !PLANET_JP[p2]) continue;
    if (!(personal.indexOf(p1) >= 0 || personal.indexOf(p2) >= 0)) continue;
    picked.push({ p1: p1, p2: p2, type: asp.type });
    if (picked.length >= 3) break;
  }
  let html = `<div class="kami-name" style="min-height:auto; padding:2.4rem 1rem;">
    <p class="small-label">${n1} さん × ${n2} さん</p>
    <h2>相性 ${score}点</h2>
    <p class="kami-words">${band.title}</p>
  </div>
  <div class="result-card"><h3>星が語るふたり</h3><p>${band.text}</p></div>`;
  if (picked.length) {
    html += `<div class="result-card"><h3>ふたりを結ぶ星の配置</h3>` + picked.map(p => {
      const asp = ASPECT_JP[p.type] || { name: p.type, tone: "響き合う" };
      return `<p>・${n1}さんの${PLANET_JP[p.p1]}と${n2}さんの${PLANET_JP[p.p2]}が「${asp.name}」——${PLANET_THEME[p.p1]}と${PLANET_THEME[p.p2]}が${asp.tone}配置です。</p>`;
    }).join("") + `</div>`;
  }
  html += shareRowHtml(`「神と髪」で${n1}と${n2}の相性を占ったら ${score}点・${band.title} でした⛩️`);
  html += `<p style="text-align:center; font-size:0.72rem; color:#a8a396; margin-top:0.8rem;">※この占いは、楽しんでいただくためのものです</p>`;
  return html;
}

// ══════ 生まれてからの年数で読む「人生の周期」 ══════
function getCurrentAge(birthdateStr) {
  const b = new Date(birthdateStr);
  const now = new Date();
  let age = now.getFullYear() - b.getFullYear();
  const m = now.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < b.getDate())) age--;
  return age;
}

function getLifeCycle(age, element) {
  const phaseLen = 7;
  const phaseIndex = Math.floor(age / phaseLen) % 4;
  const phaseYearInCycle = age % phaseLen;
  const yearsToNext = phaseLen - phaseYearInCycle;
  const phases = ["種をまく時期", "育てる時期", "花を咲かせる時期", "実りを収める時期"];
  const phaseAdvice = {
    "種をまく時期": "新しいことを始めるほど、後の実りが大きくなる時期です。小さな一歩を恐れないでください。",
    "育てる時期": "地道な積み重ねが力になる時期です。派手さより、続けることが何よりの成果になります。",
    "花を咲かせる時期": "これまでの努力が、周りから見える形になって表れやすい時期です。遠慮せず前に出てください。",
    "実りを収める時期": "得たものを整理し、本当に大切なものを選び取る時期です。手放すことも、豊かさの一部です。",
  };
  const phase = phases[phaseIndex];
  return {
    phase,
    advice: phaseAdvice[phase],
    yearsToNext,
    nextAge: age + yearsToNext,
  };
}

   画面制御

let currentStep = 0;
let answers = {};

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}
function goHome() { show("start"); }

function startDiagnosis() {
  currentStep = 0;
  answers = {};
  renderStep();
  show("quiz");
}

function renderStep() {
  const step = STEPS[currentStep];
  document.getElementById("progressBar").style.width = ((currentStep) / STEPS.length * 100) + "%";
  document.getElementById("stepLabel").textContent = `${currentStep + 1} / ${STEPS.length} — ${step.label}`;
  document.getElementById("prevBtn").style.visibility = currentStep === 0 ? "hidden" : "visible";
  document.getElementById("nextBtn").textContent = currentStep === STEPS.length - 1 ? "結果を見る" : "つぎへ";

  let html = `<h2 class="q-title">${step.title}</h2>`;
  for (const f of step.fields) {
    html += `<div class="field"><label class="name">${f.label}</label>`;
    const saved = answers[f.key];
    if (f.type === "text") {
      html += `<input type="text" id="f_${f.key}" placeholder="${f.placeholder || ''}" value="${saved || ''}">`;
    } else if (f.type === "date") {
      html += `<input type="date" id="f_${f.key}" value="${saved || ''}">`;
    } else if (f.type === "time") {
      html += `<input type="time" id="f_${f.key}" value="${saved || ''}">`;
    } else if (f.type === "textarea") {
      html += `<textarea id="f_${f.key}" placeholder="${f.placeholder || ''}">${saved || ''}</textarea>`;
    } else if (f.type === "choice") {
      html += `<div class="choices" id="f_${f.key}">`;
      for (const opt of f.options) {
        const checked = saved === opt ? "checked" : "";
        html += `<label><input type="radio" name="f_${f.key}" value="${opt}" ${checked}><span>${opt}</span></label>`;
      }
      html += `</div>`;
    } else if (f.type === "multi") {
      html += `<div class="choices" id="f_${f.key}">`;
      for (const opt of f.options) {
        const checked = Array.isArray(saved) && saved.includes(opt) ? "checked" : "";
        html += `<label><input type="checkbox" name="f_${f.key}" value="${opt}" ${checked}><span>${opt}</span></label>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  document.getElementById("quizBody").innerHTML = html;
}

function collectStep() {
  const step = STEPS[currentStep];
  for (const f of step.fields) {
    if (f.type === "text" || f.type === "date" || f.type === "time" || f.type === "textarea") {
      answers[f.key] = document.getElementById("f_" + f.key).value.trim();
    } else if (f.type === "choice") {
      const sel = document.querySelector(`input[name="f_${f.key}"]:checked`);
      answers[f.key] = sel ? sel.value : "";
    } else if (f.type === "multi") {
      answers[f.key] = [...document.querySelectorAll(`input[name="f_${f.key}"]:checked`)].map(i => i.value);
    }
  }
}

function nextStep() {
  collectStep();
  const err = document.getElementById("formError");
  err.textContent = "";
  if (currentStep === 0) {
    if (!answers.name) { err.textContent = "お名前を入力してください"; return; }
    if (!answers.birthdate) { err.textContent = "生年月日を入力してください（占いに使います）"; return; }
  }
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep();
    window.scrollTo(0, 0);
  } else {
    finishDiagnosis();
  }
}

function prevStep() {
  collectStep();
  if (currentStep > 0) { currentStep--; renderStep(); window.scrollTo(0, 0); }
}

function finishDiagnosis() {
  const result = buildResult(answers);
  const record = {
    id: Date.now(),
    createdAt: new Date().toISOString(),
    answers: { ...answers },
    result,
  };
  saveRecord(record);
  syncRecord(record);
  renderResult(record);
  show("result");
}

    html += `
    <div class="result-card">
      <h3>あなたに似合うスタイルの方向</h3>
      <p>${r.styleAdvice}</p>
      ${a.idealImage ? `<p>なりたいイメージ「${a.idealImage}」——その願いに、骨格と星は味方しています。</p>` : ""}
    </div>`;
  }
  if (r.careLines.length) {
    html += `
    <div class="result-card">
      <h3>本来の自分へ還るケア</h3>
      ${r.careLines.map(l => `<p>・${l}</p>`).join("")}
    </div>`;
  }
  if (a.topWorry && a.topWorry !== "特にない" && WORRY_MSG[a.topWorry]) {
    const msg = WORRY_MSG[a.topWorry][r.element] || "";
    html += `
    <div class="result-card">
      <h3>いちばんの気がかり —「${a.topWorry}」</h3>
      <p>${msg}</p>
      ${a.worryDetail ? `<p>「${a.worryDetail}」——その迷いも、ここまでの流れの一部です。答えはすでに、あなたの中にあります。</p>` : ""}
    </div>`;
  }
  if (r.concerns.length) {
    html += `
    <div class="result-card">
      <h3>いまの髪の悩みへ</h3>
      <p>「${r.concerns.join("・")}」——悩みは、髪があなたに送っているサインです。整えるたびに、少しずつ本来の自分へ近づいていきます。</p>
    </div>`;
  }
  html += renderOutcomeSection(record);
  html += shareRowHtml(`「神と髪」で占ったら、私の髪の神様は『${r.kamiName}』でした⛩️`);
  html += `<p style="text-align:center; font-size:0.8rem; color:#8a8577; margin-top:1rem;">${a.name} さま ／ ${dateStr}</p>`;
  html += `<p style="text-align:center; font-size:0.72rem; color:#a8a396; margin-top:0.3rem;">※この占いは、楽しんでいただくためのものです</p>`;
  document.getElementById("resultBody").innerHTML = html;
  ensureDeepReading(record);
}

function renderOutcomeSection(record) {
  if (record.lifeStory) {
    const o = record.lifeStory;
    return `<div class="outcome-box">
      <h3>あなたの人生の記録</h3>
      <p>鑑定の当てはまり：${o.fit || "—"}</p>
      ${o.turningPoint ? `<p>人生の転機：${o.turningPoint}</p>` : ""}
      ${o.effort ? `<p>頑張った時期：${o.effort}</p>` : ""}
      ${o.loveFamily ? `<p>恋愛・家庭：${o.loveFamily}</p>` : ""}
      ${o.lesson ? `<p>学び・大切にしていること：${o.lesson}</p>` : ""}
    </div>`;
  }
  return `<div class="outcome-box">
    <h3>あなたの人生を、少しだけ聞かせてください</h3>
    <p style="font-size:0.85rem; color:#6b665d; margin-bottom:1.2rem;">鑑定はいかがでしたか。あなたが歩んでこられた道のりそのものが、この占いを育てる一番の知恵になります。話せる範囲で大丈夫です。<br><span style="font-size:0.75rem; color:#a8a396;">※ご回答は、占いをより良くするための研究データとして記録されます</span></p>
    <div class="field"><label class="name">この鑑定は、当てはまっていましたか？</label><div class="choices">
      ${["よく当たっている","半分くらい","あまり"].map(o => `<label><input type="radio" name="o_fit" value="${o}"><span>${o}</span></label>`).join("")}
    </div></div>
    <div class="field"><label class="name">これまでの人生で、一番の転機はどんなことでしたか？</label>
      <textarea id="o_turning" placeholder="例：30歳での転職、結婚、引っ越しなど"></textarea></div>
    <div class="field"><label class="name">一番頑張った時期・乗り越えたことは？</label>
      <textarea id="o_effort" placeholder="例：子育てと仕事の両立の時期"></textarea></div>
    <div class="field"><label class="name">恋愛や家族のこれまでを、話せる範囲で</label>
      <textarea id="o_love" placeholder="任意です"></textarea></div>
    <div class="field"><label class="name">人生で学んだこと・大切にしていることは？</label>
      <textarea id="o_lesson" placeholder="例：無理をしないこと"></textarea></div>
    <button class="btn small" onclick="saveLifeStory(${record.id})">記録する</button>
  </div>`;
}

function saveLifeStory(id) {
  const list = loadRecords();
  const rec = list.find(r => r.id === id);
  if (!rec) return;
  const fit = document.querySelector('input[name="o_fit"]:checked');
  rec.lifeStory = {
    fit: fit ? fit.value : "",
    turningPoint: document.getElementById("o_turning").value.trim(),
    effort: document.getElementById("o_effort").value.trim(),
    loveFamily: document.getElementById("o_love").value.trim(),
    lesson: document.getElementById("o_lesson").value.trim(),
    recordedAt: new Date().toISOString(),
  };
  localStorage.setItem(STORE_KEY, JSON.stringify(list));
  syncRecord(rec);
  renderResult(rec);
}

/* ══════════════════════════════════════
   記録の保存・一覧
   ══════════════════════════════════════ */
const STORE_KEY = "kamiuranai_records";

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}
function saveRecord(record) {
  const list = loadRecords();
  list.unshift(record);
  localStorage.setItem(STORE_KEY, JSON.stringify(list));
}
function deleteRecord(id) {
  if (!confirm("この記録を削除しますか？")) return;
  const list = loadRecords().filter(r => r.id !== id);
  localStorage.setItem(STORE_KEY, JSON.stringify(list));
  showRecords();
}

function showRecords() {
  const list = loadRecords();
  const el = document.getElementById("recordList");
  if (!list.length) {
    el.innerHTML = `<p class="empty">まだ記録がありません。<br>最初の占いをはじめましょう。</p>`;
  } else {
    el.innerHTML = list.map(r => `
      <div class="record" onclick="openRecord(${r.id})">
        <div class="info">
          <div class="name">${r.answers.name || "（無名）"}${r.lifeStory ? '<span class="rec-badge">人生の記録あり</span>' : '<span class="rec-badge todo">未記録</span>'}</div>
          <div class="meta">${new Date(r.createdAt).toLocaleString("ja-JP")} ／ ${r.result.kamiName} ／ ${r.result.zodiac}・数秘${r.result.numerology}</div>
        </div>
        <button class="del" onclick="event.stopPropagation(); deleteRecord(${r.id})">削除</button>
      </div>`).join("");
  }
  show("records");
}

function openRecord(id) {
  const rec = loadRecords().find(r => r.id === id);
  if (!rec) return;
  renderResult(rec);
  show("result");
}

function exportRecords() {
  const list = loadRecords();
  if (!list.length) { alert("記録がありません"); return; }
  downloadBlob(JSON.stringify(list, null, 2), "application/json", `kamiuranai_records_${today()}.json`);
}

function downloadBlob(content, type, filename) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const aTag = document.createElement("a");
  aTag.href = url;
  aTag.download = filename;
  aTag.click();
  URL.revokeObjectURL(url);
}
function today() { return new Date().toISOString().slice(0, 10); }

/* ══════════════════════════════════════
   CSV書き出し（1件 = 1行に平坦化）
   ══════════════════════════════════════ */
const CSV_HEADERS = ["ID","診断日時","名前","生年月日","血液型","生まれた時間帯","出生時刻","出生地",
  "頭皮タイプ","頭皮の色","髪の太さ","コシ","クセ","つむじ","つむじの位置","毛量","ツヤ","ダメージ",
  "顔型","骨格","額","生え際","悩み","生活リズム","ストレス","食生活",
  "みたい占い","一番の気がかり","気がかり詳細",
  "理想イメージ","カラー傾向","施術者メモ",
  "星座","元素","数秘","干支","十二時辰","髪の神様",
  "当てはまり度","人生の転機","頑張った時期","恋愛・家庭","学び・大切なこと","人生記録日時","性別"];

function flattenRecord(r) {
  const a = r.answers || {}, res = r.result || {}, o = r.lifeStory || {};
  return [r.id, r.createdAt, a.name, a.birthdate, a.blood, a.birthtime, a.birthTimeExact, a.birthplace,
    a.scalpType, a.scalpColor, a.thickness, a.elasticity, a.curl, a.cowlick,
    Array.isArray(a.cowlickPos) ? a.cowlickPos.join("・") : "", a.volume, a.shine, a.damage,
    a.faceShape, a.bodyType, a.forehead, a.hairline,
    Array.isArray(a.concerns) ? a.concerns.join("・") : "", a.rhythm, a.stress, a.diet,
    Array.isArray(a.fortuneTopics) ? a.fortuneTopics.join("・") : "", a.topWorry, a.worryDetail,
    a.idealImage, a.colorPref, a.memo,
    res.zodiac, res.element, res.numerology, res.eto, res.shichenName, res.kamiName,
    o.fit, o.turningPoint, o.effort, o.loveFamily, o.lesson, o.recordedAt, a.gender];
}

function exportCsv() {
  const list = loadRecords();
  if (!list.length) { alert("記録がありません"); return; }
  const esc = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
  const rows = [CSV_HEADERS.map(esc).join(",")];
  for (const r of list) rows.push(flattenRecord(r).map(esc).join(","));
  downloadBlob("﻿" + rows.join("\r\n"), "text/csv", `kamiuranai_records_${today()}.csv`);
}

/* ══════════════════════════════════════
   スプレッドシート連携（Google Apps Script）
   ══════════════════════════════════════ */
const GAS_KEY = "kamiuranai_gas_url";
// 公開版に組み込む送信先（スプレッドシート受け口のURL）
const EMBEDDED_GAS_URL = "https://script.google.com/macros/s/AKfycbw2jDXXfiPbXqVVVz0I_obarv4bXVp7A8cadDEqk2GNL_EX0JFwg8YJsTnHec8eiszG/exec";

function getGasUrl() { return localStorage.getItem(GAS_KEY) || EMBEDDED_GAS_URL; }

function openSettings() {
  const cur = getGasUrl();
  const v = prompt(
    "Googleスプレッドシート連携URL（Apps ScriptのウェブアプリURL）を貼り付けてください。\n空にしてOKすると連携を解除します。\n※設定方法は README.md を見てください",
    cur
  );
  if (v === null) return;
  localStorage.setItem(GAS_KEY, v.trim());
  alert(v.trim()
    ? "連携を設定しました。以後の診断・施術記録は自動でスプレッドシートにも送られます。"
    : "連携を解除しました。記録はこの端末にのみ保存されます。");
}

function syncRecord(record) {
  const url = getGasUrl();
  if (!url) return;
  fetch(url, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(record),
  }).catch(e => console.warn("シート送信に失敗しました（端末には保存済み）", e));
}

async function syncAll() {
  const url = getGasUrl();
  if (!url) { alert("先にトップ画面の「データ連携の設定」でURLを設定してください"); return; }
  const list = loadRecords();
  if (!list.length) { alert("記録がありません"); return; }
  for (const r of list) {
    syncRecord(r);
    await new Promise(res => setTimeout(res, 300));
  }
  alert(`${list.length}件をスプレッドシートへ送信しました`);
}

/* ══════════════════════════════════════
   傾向分析
   ══════════════════════════════════════ */
function countBy(items) {
  const map = {};
  for (const i of items) { if (i) map[i] = (map[i] || 0) + 1; }
  return Object.entries(map).sort((a, b) => b[1] - a[1]);
}

function barsHtml(entries, total) {
  return entries.map(([label, n]) =>
    `<p>${label}　${n}件</p><div class="bar"><i style="width:${Math.round(n / total * 100)}%"></i></div>`
  ).join("");
}

function showStats() {
  const list = loadRecords();
  const el = document.getElementById("statsBody");
  if (!list.length) {
    el.innerHTML = `<p class="empty">まだ記録がありません。<br>データが貯まるほど、ここに傾向が見えてきます。</p>`;
    show("stats");
    return;
  }
  const withStory = list.filter(r => r.lifeStory);
  const fits = countBy(withStory.map(r => r.lifeStory.fit));
  const fitOk = withStory.filter(r => ["よく当たっている", "半分くらい"].includes(r.lifeStory.fit)).length;
  const concerns = countBy(list.flatMap(r => Array.isArray(r.answers.concerns) ? r.answers.concerns : []));
  const kami = countBy(list.map(r => r.result.kamiName));
  const scalp = countBy(list.map(r => r.answers.scalpType));

  let html = `
    <div class="stat-card">
      <h3>記録の状況</h3>
      <p>診断 ${list.length}件 ／ 人生の記録あり ${withStory.length}件（未記録 ${list.length - withStory.length}件）</p>
      ${withStory.length ? `<p>鑑定の当てはまり率：<strong>${Math.round(fitOk / withStory.length * 100)}%</strong></p>` : `<p>人生の記録が貯まると、当てはまり率がここに出ます。</p>`}
    </div>`;
  if (fits.length) {
    html += `<div class="stat-card"><h3>当てはまり度の内訳</h3>${barsHtml(fits, withStory.length)}</div>`;
  }
  const worries = countBy(list.map(r => r.answers.topWorry).filter(w => w && w !== "特にない"));
  if (worries.length) {
    html += `<div class="stat-card"><h3>いちばんの気がかりの傾向（人生の悩みデータ）</h3>${barsHtml(worries, list.length)}</div>`;
  }
  const topics = countBy(list.flatMap(r => Array.isArray(r.answers.fortuneTopics) ? r.answers.fortuneTopics : []));
  if (topics.length) {
    html += `<div class="stat-card"><h3>占いでみたいことの傾向</h3>${barsHtml(topics.slice(0, 6), list.length)}</div>`;
  }
  if (concerns.length) {
    html += `<div class="stat-card"><h3>髪の悩みの傾向</h3>${barsHtml(concerns.slice(0, 6), list.length)}</div>`;
  }
  html += `<div class="stat-card"><h3>髪の神様の分布</h3>${barsHtml(kami, list.length)}</div>`;
  if (scalp.length) {
    html += `<div class="stat-card"><h3>頭皮タイプの分布</h3>${barsHtml(scalp, list.length)}</div>`;
  }
  html += `<p style="font-size:0.8rem; color:#8a8577; text-align:center; margin-top:1.5rem;">CSVやJSONを書き出してClaudeに渡すと、<br>このデータをもとに診断ルールを改善できます。</p>`;
  el.innerHTML = html;
  show("stats");
}
</script>
