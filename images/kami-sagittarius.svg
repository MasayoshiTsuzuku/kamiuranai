    <circle cx="523" cy="138" r="1.7" opacity="0.42"/>
    <circle cx="624" cy="48" r="1.3" opacity="0.30"/>
    <circle cx="145" cy="202" r="1.4" opacity="0.53"/>
    <circle cx="127" cy="297" r="1.5" opacity="0.70"/>
