    <circle cx="357" cy="185" r="1.5" opacity="0.39"/>
    <circle cx="89" cy="20" r="1.0" opacity="0.44"/>
    <circle cx="768" cy="177" r="1.6" opacity="0.36"/>
    <circle cx="563" cy="49" r="1.6" opacity="0.32"/>
    <circle cx="189" cy="18" r="1.1" opacity="0.48"/>
    <circle cx="33" cy="265" r="1.1" opacity="0.68"/>
    <circle cx="466" cy="87" r="1.0" opacity="0.65"/>
    <circle cx="535" cy="42" r="1.4" opacity="0.47"/>
    <circle cx="554" cy="39" r="0.9" opacity="0.47"/>
    <circle cx="267" cy="44" r="1.5" opacity="0.68"/>
    <circle cx="53" cy="256" r="1.6" opacity="0.35"/>
