    <path d="M420 150 C 430 90, 400 55, 430 5"/>
    <path d="M380 155 C 330 110, 350 70, 300 40"/>
    <path d="M440 165 C 490 110, 470 70, 515 40"/>
    <path d="M360 175 C 290 140, 300 90, 250 70"/>
    <path d="M455 180 C 525 145, 515 95, 565 75"/>
    <path d="M345 200 C 260 180, 250 130, 195 120"/>
    <path d="M470 205 C 550 185, 560 135, 615 125"/>
