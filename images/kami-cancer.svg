<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0e1a2e"/>
      <stop offset="0.55" stop-color="#28466e"/>
      <stop offset="1" stop-color="#3a5e88"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.6" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.44" r="0.5">
      <stop offset="0" stop-color="#cfe0f8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#cfe0f8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.62" stop-color="#cfe0f8" stop-opacity="0"/>
      <stop offset="0.78" stop-color="#cfe0f8" stop-opacity="0.55"/>
      <stop offset="0.86" stop-color="#cfe0f8" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#cfe0f8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
