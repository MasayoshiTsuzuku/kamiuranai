  <circle cx="400" cy="215" r="55" fill="none" stroke="#cfe8d9" stroke-width="2.2" opacity="0.65"/>
  <path d="M312 395 C 322 302, 372 287, 400 287 C 428 287, 478 302, 488 395" fill="none" stroke="#cfe8d9" stroke-width="1.8" opacity="0.45"/>
  <g fill="#cfe8d9" opacity="0.95" filter="url(#soft)">
    <path d="M400 130 C 388 118, 386 102, 396 90 C 402 102, 402 118, 400 130 Z"/>
    <path d="M404 128 C 414 120, 420 106, 414 94 C 406 104, 404 116, 404 128 Z"/></g>
  <rect width="800" height="500" fill="url(#vignette)"/>
</svg>
