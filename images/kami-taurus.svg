    <path d="M430 250 C 470 320, 500 380, 560 460"/>
    <path d="M355 240 C 290 300, 250 340, 170 400"/>
    <path d="M445 240 C 510 300, 550 340, 630 400"/>
    <path d="M385 260 C 360 350, 340 420, 300 500"/>
    <path d="M415 260 C 440 350, 460 420, 500 500"/>
    <path d="M348 225 C 260 260, 200 280, 120 330"/>
    <path d="M452 225 C 540 260, 600 280, 680 330"/>
  </g>
  <g stroke="#8fc4a8" stroke-width="2.2" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M370 250 C 330 320, 300 380, 240 460" transform="translate(9,12)"/>
    <path d="M430 250 C 470 320, 500 380, 560 460" transform="translate(9,12)"/>
    <path d="M355 240 C 290 300, 250 340, 170 400" transform="translate(9,12)"/>
    <path d="M445 240 C 510 300, 550 340, 630 400" transform="translate(9,12)"/>
    <path d="M385 260 C 360 350, 340 420, 300 500" transform="translate(9,12)"/>
  </g>
  <g fill="#cfe8d9" opacity="0.85">
    <circle cx="250" cy="420" r="4"/>
    <circle cx="560" cy="430" r="3"/>
    <circle cx="180" cy="370" r="3"/>
    <circle cx="620" cy="360" r="4"/>
    <circle cx="320" cy="470" r="3"/>
    <circle cx="490" cy="465" r="2.5"/>
    <circle cx="140" cy="340" r="2.5"/>
