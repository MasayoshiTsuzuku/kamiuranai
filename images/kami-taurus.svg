    <circle cx="701" cy="229" r="1.7" opacity="0.33"/>
    <circle cx="348" cy="142" r="1.5" opacity="0.34"/>
    <circle cx="707" cy="124" r="0.7" opacity="0.39"/>
    <circle cx="755" cy="43" r="0.9" opacity="0.57"/>
    <circle cx="119" cy="86" r="0.7" opacity="0.73"/>
    <circle cx="366" cy="250" r="0.8" opacity="0.53"/>
    <circle cx="523" cy="273" r="0.8" opacity="0.64"/>
    <circle cx="605" cy="85" r="1.2" opacity="0.47"/>
    <circle cx="556" cy="66" r="1.7" opacity="0.63"/>
    <circle cx="209" cy="156" r="1.2" opacity="0.72"/>
    <circle cx="535" cy="234" r="1.0" opacity="0.44"/>
    <circle cx="468" cy="73" r="0.6" opacity="0.37"/>
    <circle cx="120" cy="242" r="0.9" opacity="0.66"/>
    <circle cx="376" cy="297" r="1.2" opacity="0.66"/>
    <circle cx="708" cy="300" r="0.6" opacity="0.59"/>
    <circle cx="415" cy="41" r="1.8" opacity="0.45"/>
    <circle cx="65" cy="62" r="1.9" opacity="0.61"/>
    <circle cx="136" cy="210" r="1.1" opacity="0.39"/>
    <circle cx="280" cy="260" r="1.3" opacity="0.38"/>
    <circle cx="484" cy="290" r="1.2" opacity="0.72"/>
    <circle cx="157" cy="93" r="1.4" opacity="0.56"/>
    <circle cx="696" cy="273" r="1.7" opacity="0.31"/>
    <circle cx="145" cy="246" r="0.9" opacity="0.75"/>
