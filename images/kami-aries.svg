  <path d="M368 300 C 385 322, 415 322, 432 300" fill="none" stroke="#ffd9a0" stroke-width="2" opacity="0.55"/>
  <!-- 輪郭のふち光 -->
  <circle cx="400" cy="215" r="55" fill="none" stroke="#ffd9a0" stroke-width="2.2" opacity="0.65"/>
  <path d="M312 395 C 322 302, 372 287, 400 287 C 428 287, 478 302, 488 395" fill="none" stroke="#ffd9a0" stroke-width="1.8" opacity="0.45"/>
  <path d="M400 128 C 392 112, 402 100, 398 86 C 410 98, 412 112, 404 126 C 414 118, 416 108, 422 102 C 420 116, 414 126, 404 132 Z" fill="#ffd9a0" opacity="0.95" filter="url(#soft)"/>
