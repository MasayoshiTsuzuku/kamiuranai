    <path d="M420 150 C 430 90, 400 55, 430 5" transform="translate(9,12)"/>
    <path d="M380 155 C 330 110, 350 70, 300 40" transform="translate(9,12)"/>
    <path d="M440 165 C 490 110, 470 70, 515 40" transform="translate(9,12)"/>
    <path d="M360 175 C 290 140, 300 90, 250 70" transform="translate(9,12)"/>
  </g>
  <g fill="#ffd9a0" opacity="0.85">
    <circle cx="320" cy="60" r="4"/>
    <circle cx="480" cy="45" r="3"/>
    <circle cx="255" cy="115" r="3"/>
    <circle cx="560" cy="105" r="4"/>
    <circle cx="405" cy="30" r="3"/>
    <circle cx="205" cy="165" r="2.5"/>
    <circle cx="600" cy="160" r="2.5"/>
