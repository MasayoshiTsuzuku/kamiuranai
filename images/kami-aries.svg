    <circle cx="554" cy="226" r="1.5" opacity="0.59"/>
    <circle cx="421" cy="293" r="0.8" opacity="0.42"/>
    <circle cx="752" cy="123" r="1.0" opacity="0.48"/>
    <circle cx="31" cy="275" r="1.3" opacity="0.48"/>
    <circle cx="60" cy="168" r="0.9" opacity="0.33"/>
    <circle cx="159" cy="153" r="1.4" opacity="0.42"/>
    <circle cx="40" cy="245" r="0.9" opacity="0.49"/>
    <circle cx="476" cy="28" r="1.3" opacity="0.56"/>
    <circle cx="476" cy="111" r="1.6" opacity="0.26"/>
    <circle cx="769" cy="186" r="0.8" opacity="0.72"/>
