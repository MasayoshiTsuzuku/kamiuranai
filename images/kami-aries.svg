  <!-- 衣の襞 -->
  <g stroke="#ffd9a0" stroke-width="1.2" fill="none" opacity="0.3">
    <path d="M360 310 C 352 380, 350 440, 352 500"/>
    <path d="M440 310 C 448 380, 450 440, 448 500"/>
    <path d="M400 300 C 400 370, 400 440, 400 500"/>
