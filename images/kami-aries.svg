  <!-- 神様 -->
  <g fill="#2a0d06">
    <circle cx="400" cy="215" r="55"/>
    <path d="M392 268 L 408 268 L 410 292 L 390 292 Z"/>
    <path d="M310 400 C 318 300, 370 285, 400 285 C 430 285, 482 300, 490 400 C 495 450, 495 500, 495 500 L 305 500 C 305 500, 305 450, 310 400 Z"/>
