  <path d="M312 395 C 322 302, 372 287, 400 287 C 428 287, 478 302, 488 395" fill="none" stroke="#a8ccd9" stroke-width="1.8" opacity="0.45"/>
  <path d="M413 108 A 16 16 0 1 0 413 132 A 12 12 0 1 1 413 108 Z" fill="#a8ccd9" opacity="0.95" filter="url(#soft)"/>
