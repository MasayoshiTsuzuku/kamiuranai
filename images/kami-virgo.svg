  <circle cx="400" cy="215" r="55" fill="none" stroke="#e8e3b0" stroke-width="2.2" opacity="0.65"/>
  <path d="M312 395 C 322 302, 372 287, 400 287 C 428 287, 478 302, 488 395" fill="none" stroke="#e8e3b0" stroke-width="1.8" opacity="0.45"/>
